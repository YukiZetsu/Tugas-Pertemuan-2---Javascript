<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tugas 2 - JavaScript</title>
</head>
<body>

    <h2>Data Gaji Pegawai</h2>
    <table border="1" cellpadding="10" cellspacing="0">
        <thead>
            <tr>
                <th>Nama Pegawai</th>
                <th>Umur</th>
                <th>Jabatan</th>
                <th>Status</th>
                <th>Gaji Pokok</th>
                <th>Tunjangan Jabatan</th>
                <th>BPJS</th>
                <th>Tunjangan Keluarga</th>
            </tr>
        </thead>
        <tbody>
            <script>
                //Data Input
                let nama = "Dodi Prayodi";
                let umur = 25;
                let jabatan = "Manajer";
                let status = "Menikah";

                //Logika Gaji Pokok (If)
                let gapok = 0;
                if (jabatan == "Manajer") {
                    gapok = 15000000;
                } else if (jabatan == "Asisten Manajer") {
                    gapok = 10000000;
                } else if (jabatan == "Staff") {
                    gapok = 5000000;
                }

                //Perhitungan Tunjangan & BPJS
                let tunjJabatan = 0.15 * gapok; // 15% dari gapok
                let bpjs = 0.10 * gapok;        // 10% dari gapok

                //Tunjangan Keluarga (Ternary Operator)
                //Jika status == Menikah, maka 20% dari gapok, jika tidak maka 0
                let tunjKeluarga = (status == "Menikah") ? (0.20 * gapok) : 0;

                //Total Gaji
                let totalGaji = gapok + tunjJabatan + tunjKeluarga - bpjs;

                //Mencetak baris data ke dalam tbody
                document.write("<tr>" +
                    "<td>" + nama + "</td>" +
                    "<td>" + umur + " Tahun</td>" +
                    "<td>" + jabatan + "</td>" +
                    "<td>" + status + "</td>" +
                    "<td>" + gapok + "</td>" +
                    "<td>" + tunjJabatan + "</td>" +
                    "<td>" + bpjs + "</td>" +
                    "<td>" + tunjKeluarga + "</td>" +
                "</tr>");
            </script>
        </tbody>
        <tfoot>
            <tr>
                <th colspan="7">Total Gaji yang Diterima</th>
                <th>
                    <script>
                        // Cetak total gaji di bagian tfoot
                        document.write(totalGaji);
                    </script>
                </th>
            </tr>
        </tfoot>
    </table>

</body>
</html>
